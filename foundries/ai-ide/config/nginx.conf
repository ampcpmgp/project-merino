server {
    listen 80;
    server_name localhost;

    # 公開するファイルのルートディレクトリ
    root /workspace/public;
    index index.html index.htm;

    # 短縮URL: /s/<key> -> /workspace/url-shortcuts/<key> に記載されたURLへリダイレクト
    location ~ ^/s/(.+)$ {
        content_by_lua_block {
            local key = ngx.var[1]
            local f = io.open("/workspace/url-shortcuts/" .. key, "r")
            if not f then
                ngx.status = 404
                ngx.header["Content-Type"] = "text/plain; charset=utf-8"
                ngx.say("Short URL not found: " .. key)
                return
            end
            local target = f:read("*l")
            f:close()
            if not target or target == "" then
                ngx.status = 404
                ngx.header["Content-Type"] = "text/plain; charset=utf-8"
                ngx.say("Short URL not found: " .. key)
                return
            end
            if not target:match("^https?://") then
                ngx.status = 400
                ngx.header["Content-Type"] = "text/plain; charset=utf-8"
                ngx.say("Invalid URL for key: " .. key)
                return
            end
            return ngx.redirect(target, 302)
        }
    }

    location / {
        fancyindex on; 
        fancyindex_exact_size off; # ファイルサイズをKB, MB, GBで表示する
        fancyindex_localtime on;   # ファイルのタイムスタンプをローカルタイムで表示する
    }

    # キャッシュを無効化する設定
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, post-check=0, pre-check=0";
}
