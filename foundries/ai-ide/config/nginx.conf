server {
    listen 80;
    server_name localhost;

    # 公開するファイルのルートディレクトリ
    root /workspace/public;
    index index.html index.htm;

    # 短縮URL: /s/<key> -> 設定ファイルに記載されたURLへリダイレクト
    location ~ ^/s/(.+)$ {
        content_by_lua_block {
            local key = ngx.var[1]
            local shortcuts_file = "/workspace/url-shortcuts.txt"
            local f = io.open(shortcuts_file, "r")
            if not f then
                ngx.status = 404
                ngx.header["Content-Type"] = "text/plain; charset=utf-8"
                ngx.say("Short URL not found")
                return
            end
            local target = nil
            for line in f:lines() do
                if not line:match("^%s*#") and not line:match("^%s*$") then
                    local k, v = line:match("^([^%s]+)%s+(.+)$")
                    if k == key then
                        target = v
                        break
                    end
                end
            end
            f:close()
            if target then
                return ngx.redirect(target, 302)
            else
                ngx.status = 404
                ngx.header["Content-Type"] = "text/plain; charset=utf-8"
                ngx.say("Short URL not found: " .. key)
            end
        }
    }

    location / {
        fancyindex on; 
        fancyindex_exact_size off; # ファイルサイズをKB, MB, GBで表示する
        fancyindex_localtime on;   # ファイルのタイムスタンプをローカルタイムで表示する
    }

    # キャッシュを無効化する設定
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, post-check=0, pre-check=0";
}
