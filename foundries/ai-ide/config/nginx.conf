server {
    listen 80;
    server_name localhost;

    # 公開するファイルのルートディレクトリ
    root /workspace/public;
    index index.html index.htm;

    # ディレクトリインデックス（一覧ページ）のみ認証をかける
    location ~ /$ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/htpasswd;

        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_localtime on;
    }

    # 短縮URL: /s/<key> -> /workspace/url-shortcuts/<key> に記載されたURLへリダイレクト
    location ~ ^/s/(.+)$ {
        content_by_lua_block {
            local f = io.open("/workspace/url-shortcuts/" .. ngx.var[1], "r")
            if f then ngx.redirect(f:read("*l"), 302) end
        }
    }

    # .git ディレクトリおよび関連ファイルへのアクセスを全員に禁止
    location ~ /\.git {
        deny all;
        return 404;
    }

    # アンダースコアで始まるファイルは認証をかける
    location ~ /_[^/]*$ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/htpasswd;
    }

    # その他のファイルアクセス（認証なし）
    location / {
        try_files $uri $uri/ =404;
    }

    # キャッシュを無効化する設定
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, post-check=0, pre-check=0";
}

# Hermes Dashboard (cloudflared 経由で直接アクセス)
server {
    listen 127.0.0.1:9118;

    location / {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/htpasswd;
        proxy_pass http://127.0.0.1:9119/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
