server {
    listen 80;
    server_name localhost;

    # 公開するファイルのルートディレクトリ
    root /workspace/public;
    index index.html index.htm;

    # ディレクトリインデックス（一覧ページ）のみ認証をかける
    location ~ /$ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/htpasswd;

        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_localtime on;
    }

    # 短縮URL: /s/<key> -> /workspace/url-shortcuts/<key> に記載されたURLへリダイレクト
    location ~ ^/s/(.+)$ {
        content_by_lua_block {
            local f = io.open("/workspace/url-shortcuts/" .. ngx.var[1], "r")
            if f then ngx.redirect(f:read("*l"), 302) end
        }
    }

    # .git ディレクトリおよび関連ファイルへのアクセスを全員に禁止
    location ~ /\.git {
        deny all;
        return 404;
    }

    # アンダースコアで始まるファイルは認証をかける
    location ~ /_[^/]*$ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/htpasswd;
    }

    # その他のファイルアクセス（認証なし）
    location / {
        try_files $uri $uri/ =404;
    }

    # キャッシュを無効化する設定
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, post-check=0, pre-check=0";
}

# Whiteboard (Excalidraw) - port 3100
server {
    listen 3100;
    server_name localhost;

    # Basic authentication - same password as code-server
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/htpasswd;

    # Excalidraw frontend - serve static files directly
    location / {
        root /home/appuser/app/whiteboard/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # y-websocket for real-time collaboration (Hocuspocus)
    location /socket {
        proxy_pass http://localhost:3102;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        port_in_redirect off;
        proxy_read_timeout 86400;
    }

    # Storage API for persistence
    location /api {
        proxy_pass http://localhost:3103;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}

# Hermes Dashboard (cloudflared 経由で直接アクセス)
# APIパス(/api/*) はBasic Authの対象外 — Dashboard側のセッショントークン認証で保護されている。
# これにより iOS Safari でのSPA fetch() による無限認証ループを防止する。
server {
    listen 127.0.0.1:9118;

    # API routes → Basic Auth不要 (セッショントークン認証で保護済み)
    # NOTE: proxy_pass に末尾スラッシュを付けないこと。
    # 付けると nginx が /api プレフィックスを削ってバックエンドに転送する。
    location /api/ {
        proxy_pass http://127.0.0.1:9119;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Dashboard SPA / kanban ページ → Basic Auth (初回ページロード時に認証)
    location / {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/htpasswd;
        proxy_pass http://127.0.0.1:9119/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# Private files - /workspace/private/ (Basic Auth required)
# Cloudflare Access (Google OAuth) should be configured on the dashboard side
# pointing to localhost:81 for this server block.
server {
    listen 81;
    server_name localhost;

    root /workspace/private;
    index index.html;

    # Basic authentication as local gate
    auth_basic "Private";
    auth_basic_user_file /etc/nginx/htpasswd;

    # Directory listing with fancyindex (same style as public area)
    location ~ /$ {
        auth_basic "Private";
        auth_basic_user_file /etc/nginx/htpasswd;

        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_localtime on;
    }

    # File access
    location / {
        try_files $uri $uri/ =404;
    }

    # html-api backend proxy
    location /html-api/ {
        auth_basic "Private";
        auth_basic_user_file /etc/nginx/htpasswd;
        proxy_pass http://localhost:3200/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-User $remote_user;
        proxy_redirect off;
        proxy_read_timeout 86400;
        proxy_buffering off;
        proxy_cache off;
    }

    # Disable cache
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, post-check=0, pre-check=0";
}

